name: Tests

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      # Use the PR head branch (not the merge commit) so auto-commit can push changes back to the PR.
      # Falls back to the default ref on push/workflow_dispatch where head_ref is empty.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      - name: Run tests
        run: |
          yarn install --frozen-lockfile
          yarn test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck source
        run: yarn typecheck

      - name: Build bundled action
        run: yarn build

      # Auto-commit rebuilt dist/ back to the branch so dependency-update PRs
      # (Renovate, Dependabot, etc.) don't fail due to an outdated bundle.
      - name: Commit dist changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: rebuild dist"
          file_pattern: "dist/*"

      - name: Dump context
        uses: crazy-max/ghaction-dump-context@4d9eeaf15dd59aa4346919ea84a84ccf514b4db8 # v3.1.0
